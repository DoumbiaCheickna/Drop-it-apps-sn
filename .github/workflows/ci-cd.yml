name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Lint et formatage
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🔍 Run ESLint
      run: npm run lint:js || true
      
    - name: 🎨 Run Stylelint
      run: npm run lint:css || true
      
    - name: ✨ Check formatting
      run: npm run format -- --check || true

  # Job 2: Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run tests
      run: npm test

  # Job 3: Build
  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🔨 Build project
      run: echo "Build completed"
      
    - name: 📤 Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-files
        path: |
          index.html
          assets/
          manifest.json
        retention-days: 7

  # Job 4: Déploiement sur Firebase (seulement sur main)
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
      
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: 📦 Install Firebase CLI
      run: npm install -g firebase-tools
      
    - name: 🚀 Deploy to Firebase
      run: firebase deploy --only hosting
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
    - name: ✅ Deployment Success
      run: echo "🎉 Deployed to Firebase Hosting!"

  # Job 5: Notifications
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    
    steps:
    - name: 📧 Send notification
      run: |
        if [ "${{ needs.lint.result }}" == "success" ] && 
           [ "${{ needs.test.result }}" == "success" ] && 
           [ "${{ needs.build.result }}" == "success" ]; then
          echo "✅ All checks passed!"
        else
          echo "❌ Some checks failed"
        fi
